name: cercania_fuel
description: "CercanIA Fuel — buscador de bencineras y registro de cargas para Chile."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.6 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # Estado
  flutter_bloc: ^8.1.4
  equatable: ^2.0.5

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0

  # Mapas y geolocalización
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # IA
  google_generative_ai: ^0.4.0   # Gemini API

  # Inyección de dependencias
  get_it: ^7.6.7
  dartz: ^0.10.1

  # Navegación
  go_router: ^13.2.0

  # UI / utilidades
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  fl_chart: ^0.67.0              # Gráficos para reportes
  intl: ^0.19.0
  shared_preferences: ^2.2.2     # Solo para preferencias no sensibles
  permission_handler: ^11.3.0
  google_sign_in: ^6.2.1
  internet_connection_checker: ^3.0.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.5
  mocktail: ^1.0.2
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/brands/
