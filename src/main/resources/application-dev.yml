spring:
  config:
    import: optional:file:secrets/application-local.yml

  datasource:
    # XAMPP MySQL/MariaDB running on localhost:3306. Create the "fuel_online_db" database in phpMyAdmin before starting.
    url: ${FUEL_DB_URL:jdbc:mysql://localhost:3306/fuel_online_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true}
    username: ${FUEL_DB_USER:root}
    password: ${FUEL_DB_PASSWORD:}
    driver-class-name: ${FUEL_DB_DRIVER:com.mysql.cj.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    # Ensures data.sql runs AFTER Hibernate has created the schema
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: America/Santiago
  sql:
    init:
      mode: always
      continue-on-error: true

app:
  security:
    # In dev no Firebase is required; use the X-Dev-User: email@local header
    dev-mode: true
  cne:
    # Token set via CNE_API_TOKEN env var — never commit the real value.
    # To trigger manually: POST /api/v1/admin/cne/sync (requires ADMIN role)
    enabled: ${CNE_ENABLED:true}
    scheduled-enabled: false

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    cl.fuelonline: DEBUG
