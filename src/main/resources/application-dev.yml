spring:
  datasource:
    url: ${BENCINA_DB_URL:jdbc:h2:mem:bencina;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${BENCINA_DB_USER:sa}
    password: ${BENCINA_DB_PASSWORD:}
    driver-class-name: ${BENCINA_DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: America/Santiago
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    cl.bencinaenlinea: DEBUG
