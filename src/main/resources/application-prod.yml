spring:
  datasource:
    url: ${BENCINA_DB_URL}
    username: ${BENCINA_DB_USER}
    password: ${BENCINA_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: America/Santiago

logging:
  level:
    cl.fuelonline: INFO
