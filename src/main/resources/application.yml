spring:
  application:
    name: fuel-online-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

app:
  security:
    # Path to the Firebase service account credentials JSON. Empty = Firebase disabled.
    firebase:
      credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
    # When enabled, accepts the X-Dev-User: <email> header to impersonate local users.
    dev-mode: ${APP_SECURITY_DEV_MODE:false}
    dev-user-header: X-Dev-User
    jwt:
      secret: ${JWT_SECRET:cercania-fuel-dev-secret-key-replace-in-production}
      expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}
      issuer: cercania-fuel

  gemini:
    api-key: ${GEMINI_API_KEY:}

  cne:
    enabled: ${CNE_ENABLED:false}
    api-url: ${CNE_API_URL:https://api.cne.cl/api/v4}
    stations-path: /estaciones
    token: ${CNE_API_TOKEN:}
    timeout: 60s
    scheduled-enabled: ${CNE_SCHEDULED_ENABLED:false}
    # Spring cron expression (6 fields): sec min hour day month dayOfWeek. Default: every hour on the hour.
    scheduled-cron: ${CNE_SCHEDULED_CRON:0 0 */1 * * *}
